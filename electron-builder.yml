appId: com.youtube.downloader
productName: YouTube Downloader
directories:
  output: dist
  buildResources: build

# 1. SPECIFICHIAMO COSA VA DENTRO L'ASAR (Solo il codice compilato)
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - "!resources/**/*" # <--- IMPORTANTE: Esclude la cartella resources dall'ASAR

# 2. SPECIFICHIAMO COSA VA FUORI (I binari pesanti)
extraResources:
  - from: "resources/win"
    to: "bin/win"
    filter:
      - "**/*"
  - from: "resources/mac/${arch}" # Prende x64 o arm64 a seconda della build
    to: "bin"
    filter:
      - "**/*"
  - from: "resources/icon.png"
    to: "bin/icon.png"

win:
  icon: build/icon.ico
  target:
    - target: portable

portable:
  artifactName: "${productName}_Portable_${version}.${ext}"

mac:
  icon: build/icons/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist